<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Travels of Marco Polo — A Chengyu Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #1a1a2e;
    --panel:        #16213e;
    --text:         #f0e6d3;
    --text-muted:   #c5b8a8;
    --accent:       #ffd700;
    --accent-2:     #ff6b35;
    --scene-bg:     #1a1a2e;
    --scene-accent: #ffd700;
    --scene-border: #000;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Serif SC", "Noto Serif", Georgia, serif;
    line-height: 1.85;
  }

  /* ── per-scene palette overrides ── */
  main[data-scene="start"]     { --scene-bg: #0a3d62; --scene-accent: #00b4d8; --scene-border: #005f73; }
  main[data-scene="acre"]      { --scene-bg: #5c3d11; --scene-accent: #f4a261; --scene-border: #e76f51; }
  main[data-scene="hormuz"]    { --scene-bg: #7b2d00; --scene-accent: #ff9d6e; --scene-border: #c1440e; }
  main[data-scene="pamir"]     { --scene-bg: #0d1b2a; --scene-accent: #e0fbfc; --scene-border: #48cae4; }
  main[data-scene="kashgar"]   { --scene-bg: #1b4332; --scene-accent: #58c08b; --scene-border: #2d6a4f; }
  main[data-scene="khanbaliq"] { --scene-bg: #3d0000; --scene-accent: #ffd700; --scene-border: #7b0000; }
  main[data-scene="ending"]    { --scene-bg: #1a1a2e; --scene-accent: #ffd700; --scene-border: #000; }

  .scroll {
    max-width: 680px;
    margin: 24px auto;
    padding: 32px;
    background: var(--panel);
    border: 4px solid #000;
    box-shadow: 8px 8px 0 #000;
    transition: background 400ms ease;
  }

  /* ── header ── */
  header.title {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 4px solid var(--scene-accent, var(--accent));
  }

  header.title h1 {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(1.0rem, 2.8vw, 1.4rem);
    line-height: 1.6;
    margin: 0 0 12px;
    color: var(--accent);
    text-shadow: 3px 3px 0 #000;
    letter-spacing: 0.04em;
  }

  header.title .romaji {
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin: 0 0 18px;
    letter-spacing: 0.06em;
  }

  /* ── pixel banner SVG ── */
  .banner {
    width: 100%;
    height: 80px;
    margin: 10px 0 20px;
    display: block;
  }

  /* ── scene panel ── */
  .scene-panel {
    position: relative;
    background: var(--scene-bg);
    padding: 28px 24px 24px;
    border: 3px solid var(--scene-border);
    box-shadow: 5px 5px 0 #000;
    min-height: 320px;
    animation: unfurl 400ms ease both;
    transition: background 400ms ease, border-color 400ms ease;
  }

  @keyframes unfurl {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── world label ── */
  .world-label {
    display: inline-block;
    font-family: "Press Start 2P", monospace;
    font-size: 0.6rem;
    color: var(--scene-accent);
    background: #000;
    padding: 3px 7px;
    margin-bottom: 10px;
    border: 1px solid var(--scene-accent);
    letter-spacing: 0.08em;
  }

  /* ── location badge ── */
  .location {
    font-family: "VT323", monospace;
    font-size: 0.875rem;
    color: var(--scene-accent);
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    text-transform: uppercase;
    display: block;
  }

  /* ── scene title / subtitle ── */
  .scene-title {
    font-family: "VT323", monospace;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    color: var(--scene-accent);
    margin: 0 0 8px;
    line-height: 1.5;
    text-shadow: 2px 2px 0 #000;
  }

  /* ── narration ── */
  .narration {
    font-size: 1.0rem;
    color: var(--text);
    margin: 0 0 24px;
    line-height: 1.9;
  }

  .narration p { margin: 0 0 1.1em; }
  .narration p:last-child { margin-bottom: 0; }

  .inline-pinyin {
    font-size: 0.78em;
    font-style: italic;
    color: var(--text-muted);
    margin-left: 0.4em;
  }

  /* ── choices ── */
  .choices {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice {
    width: 100%;
    text-align: left;
    background: #000;
    border: 3px solid var(--scene-accent);
    color: var(--scene-accent);
    font-family: "VT323", monospace;
    font-size: 1.0rem;
    line-height: 1.6;
    padding: 12px 16px;
    cursor: pointer;
    position: relative;
    box-shadow: 4px 4px 0 #000;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }

  .choice::before {
    content: attr(data-num) ". ";
    color: var(--accent);
    margin-right: 6px;
  }

  .choice:hover,
  .choice:focus-visible {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #000;
    outline: none;
  }

  /* ── chengyu card ── */
  .chengyu-card {
    margin: 24px 0;
    border: 4px solid var(--accent);
    padding: 20px 22px 18px;
    background: #000;
    position: relative;
    box-shadow: 6px 6px 0 rgba(255, 215, 0, 0.25);
    animation: stamp 500ms cubic-bezier(.2,.7,.2,1) both;
  }

  @keyframes stamp {
    0%   { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }

  .chengyu-card::after {
    content: "★";
    position: absolute;
    top: -14px;
    right: -14px;
    width: 36px;
    height: 36px;
    background: var(--accent);
    color: #000;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #000;
  }

  .chengyu-card .label {
    font-family: "VT323", monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 0 0 10px;
  }

  .chengyu-card .chars {
    font-family: "Noto Serif SC", serif;
    font-size: 2.2rem;
    color: var(--accent);
    margin: 0 0 4px;
    letter-spacing: 0.08em;
    text-shadow: 2px 2px 0 rgba(255,215,0,0.2);
  }

  .chengyu-card .pinyin {
    font-style: italic;
    font-size: 1.0rem;
    color: var(--text-muted);
    margin: 0 0 14px;
  }

  .chengyu-card .literal {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin: 0 0 10px;
  }

  .chengyu-card .meaning {
    font-size: 0.98rem;
    color: var(--text);
    margin: 0 0 12px;
    line-height: 1.7;
  }

  .chengyu-card .origin {
    font-size: 0.84rem;
    color: var(--text-muted);
    border-top: 1px solid rgba(255, 215, 0, 0.2);
    padding-top: 10px;
    margin: 0;
    line-height: 1.65;
  }

  .chengyu-card .origin::before {
    content: "origin · ";
    color: var(--accent);
    font-style: italic;
    letter-spacing: 0.06em;
  }

  /* ── continue button ── */
  .continue-btn {
    margin-top: 20px;
    background: transparent;
    border: 0;
    color: var(--accent);
    font-family: "VT323", monospace;
    font-size: 0.875rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    padding: 8px 4px;
  }

  .continue-btn::after { content: " ▶"; }
  .continue-btn:hover { color: var(--accent-2); }

  /* ── prologue name input ── */
  .prologue-name {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0 26px;
    flex-wrap: wrap;
  }

  .prologue-name label {
    font-family: "VT323", monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .prologue-name input {
    background: #000;
    border: 2px solid var(--scene-accent);
    color: var(--text);
    font-family: "Noto Serif SC", serif;
    font-size: 1.0rem;
    padding: 6px 8px;
    width: 200px;
    outline: none;
    box-shadow: 3px 3px 0 #000;
  }

  .prologue-name input:focus { border-color: var(--accent); }

  /* ── ending block ── */
  .ending-block {
    text-align: center;
    margin: 24px 0 36px;
    padding: 20px;
    border: 3px solid var(--accent);
    background: #000;
    box-shadow: 5px 5px 0 rgba(255,215,0,0.2);
  }

  .ending-block .ending-title {
    font-family: "VT323", monospace;
    font-size: clamp(1.0rem, 2.2vw, 1.3rem);
    color: var(--accent);
    margin: 0 0 8px;
    text-shadow: 2px 2px 0 #000;
  }

  .ending-block .ending-sub {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0 0 16px;
  }

  .ending-block .ending-blurb {
    max-width: 480px;
    margin: 0 auto;
    color: var(--text);
    font-size: 0.95rem;
  }

  /* ── glossary ── */
  .glossary {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 3px solid var(--accent);
  }

  .glossary h2 {
    font-family: "VT323", monospace;
    font-size: clamp(1.0rem, 2.2vw, 1.25rem);
    color: var(--accent);
    margin: 0 0 6px;
    text-shadow: 2px 2px 0 #000;
  }

  .glossary .sub {
    font-style: italic;
    color: var(--text-muted);
    margin: 0 0 26px;
    font-size: 0.88rem;
  }

  .glossary-entry {
    margin: 0 0 28px;
    padding: 0 0 0 14px;
    border-left: 3px solid var(--accent);
  }

  .glossary-entry .ge-title {
    font-family: "Noto Serif SC", serif;
    font-size: 1.3rem;
    color: var(--accent);
    margin: 0 0 2px;
  }

  .glossary-entry .ge-pinyin {
    font-style: italic;
    color: var(--text-muted);
    margin: 0 0 10px;
    font-size: 0.92rem;
  }

  .glossary-entry .ge-row {
    font-size: 0.92rem;
    color: var(--text);
    margin: 0 0 4px;
  }

  .glossary-entry .ge-row b {
    color: var(--accent);
    font-weight: 600;
    margin-right: 6px;
    font-size: 0.82rem;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* ── earned badge ── */
  .earned {
    display: inline-block;
    color: var(--accent);
    font-style: italic;
    font-size: 0.82rem;
    margin-left: 8px;
  }

  /* ── chengyu tooltip ── */
  .chengyu-tip {
    cursor: help;
    text-decoration: underline dotted var(--accent);
    text-underline-offset: 3px;
  }

  #chengyu-tooltip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    display: none;
    max-width: 280px;
    background: #000;
    color: #f0e6d3;
    border: 3px solid var(--accent);
    box-shadow: 4px 4px 0 #000;
    padding: 12px 14px;
    font-family: "VT323", monospace;
    font-size: 0.875rem;
    line-height: 1.6;
  }

  #chengyu-tooltip table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 8px;
  }

  #chengyu-tooltip td {
    padding: 2px 6px 2px 0;
    border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    vertical-align: top;
  }

  #chengyu-tooltip td:first-child {
    font-family: "Noto Serif SC", serif;
    font-size: 0.9rem;
    color: var(--accent);
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip td:nth-child(2) {
    font-style: italic;
    color: var(--text-muted);
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip .tip-translation {
    color: var(--accent);
    border-top: 1px solid rgba(255, 215, 0, 0.3);
    padding-top: 6px;
    margin-top: 2px;
    font-style: italic;
    font-size: 0.8rem;
  }

  /* ── mobile ── */
  @media (max-width: 600px) {
    .scroll { padding: 20px; margin: 0; border-left: 0; border-right: 0; box-shadow: none; }
    header.title h1 { font-size: 1.0rem; }
    .scene-title { font-size: 1.0rem; }
    .choice { font-size: 0.875rem; }
    .glossary h2 { font-size: 0.875rem; }
  }
</style>
</head>
<body>

<main class="scroll" id="scroll">

  <header class="title">
    <h1>馬可波羅遊記</h1>
    <p class="romaji">The Travels of Marco Polo &middot; a chengyu scroll</p>

    <svg class="banner" viewBox="0 0 640 80" preserveAspectRatio="none" aria-hidden="true">
      <rect width="640" height="80" fill="var(--scene-bg, #1a1a2e)"/>
      <polygon points="0,80 80,80 80,50 100,50 100,30 120,30 120,50 160,50 160,80" fill="var(--scene-accent, #ffd700)" opacity="0.35"/>
      <polygon points="200,80 240,80 240,40 260,40 260,20 280,20 280,40 320,40 320,80" fill="var(--scene-accent, #ffd700)" opacity="0.5"/>
      <polygon points="380,80 420,80 420,45 440,45 440,15 470,15 470,45 520,45 520,80" fill="var(--scene-accent, #ffd700)" opacity="0.4"/>
      <polygon points="560,80 600,80 600,55 620,55 620,35 640,35 640,80" fill="var(--scene-accent, #ffd700)" opacity="0.3"/>
      <rect x="0" y="74" width="640" height="6" fill="var(--scene-accent, #ffd700)" opacity="0.15"/>
    </svg>

  </header>

  <!-- the scene panel — JS swaps its contents -->
  <section class="scene-panel" id="panel" aria-live="polite"></section>


</main>

<div id="chengyu-tooltip" role="tooltip" aria-hidden="true"></div>

<script>
  /* ===================== chengyu data ===================== */
  const CHENGYU = {
    bujikuibu: {
      chars:    "不積跬步",
      pinyin:   "bù jī kuǐ bù, wú yǐ zhì qiān lǐ",
      literal:  "Without piling up half-steps, there is no reaching a thousand li.",
      meaning:  "Distance is not crossed in leaps. Every thousand-li road is only ever the sum of single, unglamorous steps — and the first one is the whole journey in miniature.",
      origin:   "From 《荀子·勸學》: 「不積跬步，無以至千里；不積小流，無以成江海。」— Without half-steps, no thousand li; without small streams, no rivers and seas.",
      chars_breakdown: [
        {char:"不", pinyin:"bù", meaning:"not / without"},
        {char:"積", pinyin:"jī", meaning:"to accumulate, pile up"},
        {char:"跬", pinyin:"kuǐ", meaning:"a half-step (one pace)"},
        {char:"步", pinyin:"bù", meaning:"a step, a pace"}
      ]
    },
    shibangongbei: {
      chars:    "事半功倍",
      pinyin:   "shì bàn gōng bèi",
      literal:  "Half the work, twice the result.",
      meaning:  "The smartest path is rarely the hardest one. Skill and method outrun brute effort every time.",
      origin:   "From 《孟子·盡心上》: 「故事半古之人，功必倍之。」— Those who use the methods of the ancients achieve double the result with half the effort.",
      chars_breakdown: [
        {char:"事", pinyin:"shì", meaning:"effort / task"},
        {char:"半", pinyin:"bàn", meaning:"half"},
        {char:"功", pinyin:"gōng", meaning:"achievement"},
        {char:"倍", pinyin:"bèi", meaning:"double"}
      ]
    },
    saiwengshima: {
      chars:    "塞翁失馬",
      pinyin:   "sài wēng shī mǎ",
      literal:  "The old man at the border loses his horse.",
      meaning:  "You cannot know yet whether this is bad news. What looks like loss has a way of turning itself inside out.",
      origin:   "From 《淮南子·人間訓》: an old man's horse runs away; neighbors pity him. The horse returns with a herd of wild horses, and they congratulate him. When his son breaks his leg riding one, they pity him again — but the conscription comes, and the son is spared.",
      chars_breakdown: [
        {char:"塞", pinyin:"sài", meaning:"frontier fort"},
        {char:"翁", pinyin:"wēng", meaning:"old man"},
        {char:"失", pinyin:"shī", meaning:"to lose"},
        {char:"馬", pinyin:"mǎ", meaning:"horse"}
      ]
    },
    houjibofa: {
      chars:   "厚積薄發",
      pinyin:  "hòu jī bó fā",
      literal: "Accumulate deep; release sparingly.",
      meaning: "What looks thin on the surface is the product of a long, quiet preparation. The depth shows itself only when the moment demands it.",
      origin:  "From Su Shi's 《稼說》: 「博觀而約取，厚積而薄發。」— 'Read widely and take little; accumulate much and release sparingly.' HSK 6 confirmed; gaokao favorite.",
      chars_breakdown: [
        {char:"厚", pinyin:"hòu", meaning:"thick, deep, substantial"},
        {char:"積", pinyin:"jī",  meaning:"accumulate, store up"},
        {char:"薄", pinyin:"bó",  meaning:"thin, little, sparse"},
        {char:"發", pinyin:"fā",  meaning:"release, express, send out"}
      ]
    },
    jiyuqiucheng: {
      chars: "急於求成",
      pinyin: "jí yú qiú chéng",
      literal: "Urgent to achieve success.",
      meaning: "Impatience is its own worst enemy — the urgency to succeed is precisely what prevents it.",
      origin: "Common in classical Chinese writing; pairs with 欲速則不達.",
      chars_breakdown: [
        {char:"急", pinyin:"jí",   meaning:"urgent, anxious"},
        {char:"於", pinyin:"yú",   meaning:"in, at, toward"},
        {char:"求", pinyin:"qiú",  meaning:"to seek"},
        {char:"成", pinyin:"chéng", meaning:"success, completion"}
      ]
    },
    yusuzebuda: {
      chars: "欲速則不達",
      pinyin: "yù sù zé bù dá",
      literal: "Desiring speed, one does not arrive.",
      meaning: "Urgency is not speed. The harder you push to arrive, the further the destination moves — the road rewards the patient, not the runner.",
      origin: "From 《論語·子路》: Confucius — 無欲速，無見小利. 'Do not desire speed; do not attend to small gains.'",
      chars_breakdown: [
        {char:"欲", pinyin:"yù", meaning:"to desire"},
        {char:"速", pinyin:"sù", meaning:"speed"},
        {char:"則", pinyin:"zé", meaning:"then, therefore"},
        {char:"不", pinyin:"bù", meaning:"not"},
        {char:"達", pinyin:"dá", meaning:"to arrive"}
      ]
    }
  };

  /* ===================== tooltip ===================== */
  const tooltip = document.getElementById("chengyu-tooltip");

  function buildTooltipHtml(key) {
    const c = CHENGYU[key];
    if (!c || !c.chars_breakdown) return "";
    const rows = c.chars_breakdown.map(b =>
      `<tr><td>${b.char}</td><td>${b.pinyin}</td><td>${b.meaning}</td></tr>`
    ).join("");
    return `<table>${rows}</table><div class="tip-translation">${c.literal}</div>`;
  }

  function positionTooltip(x, y) {
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight, GAP = 12;
    let lx = x + GAP, ly = y + GAP;
    if (lx + tw > window.innerWidth - 8)  lx = x - tw - GAP;
    if (ly + th > window.innerHeight - 8) ly = y - th - GAP;
    tooltip.style.left = lx + "px";
    tooltip.style.top  = ly + "px";
  }

  document.addEventListener("mouseover", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
    positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mousemove", e => {
    if (tooltip.style.display === "block") positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mouseout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    if (e.relatedTarget && e.relatedTarget.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  document.addEventListener("focusin", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    const r = tip.getBoundingClientRect();
    tooltip.style.left = r.left + "px";
    tooltip.style.top  = (r.bottom + 8) + "px";
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
  });

  document.addEventListener("focusout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  /* ===================== story scenes ===================== */
  /* each scene: { id, location (cn + en), title, subtitle, narration (array of <p>), choices: [{label, next, chengyu?}] } */

  const SCENES = {

    /* ---------- opening ---------- */
    start: {
      locationCn: "威尼斯",
      locationEn: "Venice · 1271",
      worldLabel: "WORLD 3-1",
      title: "The Departure",
      subtitle: "The oars are in the water. There is no gate to come back through.",
      prologue: true,
      narration: [
        "You are seventeen. The lagoon is grey this morning, and the salt wind off the Adriatic carries the smell of far places — cinnamon, frankincense, dust.",
        "Your father Niccolò and your uncle Maffeo are loading a small fortune in Venetian glass onto a galley bound for Acre. They mean to return to the court of Kublai Khan, and they mean to take you with them.",
        "The road ahead is long, and very few who set out ever come back.",
        "Before the oars splash, an old harbor pilot who has watched a thousand departures rests his hand on the dock post and says nothing for a moment. Then: <em>「不積跬步，無以至千里。」</em><span class=\"inline-pinyin\">bù jī kuǐ bù, wú yǐ zhì qiān lǐ</span> Ten thousand miles is nothing more than the sum of its steps. You begin with this one."
      ],
      choices: [
        { label: "Step aboard. Leave Venice behind. It will not look the same when you return.", next: "acre" }
      ]
    },

    /* ---------- scene 2: Acre — yusuzebuda lesson ---------- */
    acre: {
      locationCn: "阿克里",
      locationEn: "Acre · the Levant",
      worldLabel: "WORLD 1-2",
      title: "The Crossroads",
      subtitle: "One road home. Two ways to lose it.",
      narration: [
        "In the Acre marketplace you trade a Venetian mirror for passage onward. A Genoese captain offers you a berth on a Black Sea galleon that will reach Hormuz in eight weeks — half the time of the overland caravan.",
        "Your uncle Maffeo frowns at the galleon's barnacled hull. <span class=\"chengyu-tip\" data-key=\"yusuzebuda\" tabindex=\"0\"><em>「欲速則不達。」</em><span class=\"inline-pinyin\">yù sù zé bù dá</span></span> The man who runs faster than the road, he says, arrives last. The caravan is slower, but the roads are well-worn and the watchtowers are manned by friends of the Khan.",
        "The captain drums his fingers on the dock rail and smiles. Eight weeks, he repeats. Half the time. He has said this to every merchant on this dock for a season, and every merchant has decided for himself."
      ],
      choices: [
        { label: "Board the galleon. A gamble on speed — and on the sea not turning.", next: "hormuz" },
        { label: "Walk with your uncle into the dust. Sixteen weeks of road, no shortcuts, no rescue.", next: "hormuz", chengyu: "yusuzebuda" }
      ]
    },

    /* ---------- scene 3: Hormuz / desert — shibangongbei lesson ---------- */
    hormuz: {
      locationCn: "霍爾木茲",
      locationEn: "Hormuz · the Persian Gulf",
      worldLabel: "WORLD 2-1",
      title: "A Stranger's Offer",
      subtitle: "He has nothing. He knows everything. You have to choose which matters.",
      narration: [
        "You stand at the edge of the Dasht-i Lut, the empty desert. Heat ripples the sand into the shape of a distant sea.",
        "A merchant in a stained cotton coat approaches your caravan. He has no water of his own, no camels, no guards. He offers, in exchange for passage to Bukhara, his company — and his memory of every well and safehouse for a thousand miles.",
        "Your uncle Maffeo looks the merchant over for a long moment, then turns to your father. <span class=\"chengyu-tip\" data-key=\"shibangongbei\" tabindex=\"0\"><em>「事半功倍。」</em><span class=\"inline-pinyin\">shì bàn gōng bèi</span></span> The merchant's worth is not what he carries, Maffeo says quietly, but what he knows — and a guide who knows the wells between here and Bukhara will save us a week of digging at every dry streambed."
      ],
      choices: [
        { label: "Turn him away. The desert chose him, not you.", next: "pamir" },
        { label: "Take him in. Water spent now, knowledge kept forever — if he's telling the truth.", next: "pamir", chengyu: "shibangongbei" }
      ]
    },

    /* ---------- scene 4: Pamir — saiwengshima lesson — ---------- */
    pamir: {
      locationCn: "蔥嶺",
      locationEn: "The Pamir Mountains",
      worldLabel: "WORLD 5-1",
      title: "The Toll of the Plateau",
      subtitle: "There is nothing to decide. There is only what you carry forward.",
      narration: [
        "The Pamir plateau is twelve days of nothing. No inn, no village, no fire that is not your own. The grass is short and silver and the wind does not stop. For the first three days the bandits let you pass. They are watching. They are counting the mules.",
        "On the fourth morning they come down. Eight riders, then twelve, then thirty - too many to outrun and too well armed to fight. Their chief rides a grey horse and smiles the way a man smiles when he has done this for a living since before you were born. His name, you are told, is Vochan Bou. He is said to be the great-great-grandson of the old kings of this country, and he is said to have a kindness for men who do not waste his morning.",
        "Niccolò knows what this is. He has paid toll on worse roads. He says, without raising his voice: the toll is two crates of glass - the best pieces, the ones he has been hand-picking for the Khan since Venice. Pay it, and we go on with the men. Refuse, and we do not go on at all. He opens the crate himself. He does not look at Maffeo. He does not look at you.",
        "You watch your father lift the pieces out one at a time - the blue ewer with the long neck, the small mirror that catches the morning, the three cups with the twisted stems - and lay them in the chief outstretched coat. Vochan Bou weighs each piece in his hand the way a jeweller weighs a stone. He nods once. His men fall back to the ridge. The road is yours.",
        "You are seventeen years old and you have never seen your father pay a man for the right to pass, and the road you have spent your life walking toward feels, for the first time, as though it has been taken from you. You have lost the heart of what you brought. What you have left is the men, and the road, and the years of patience that have brought you here. Niccolò sees your face. He puts his hand on the rail of the cart and says, quietly: <span class=\"chengyu-tip\" data-key=\"saiwengshima\" tabindex=\"0\"><em>「塞翁失馬，安知非福。」</em><span class=\"inline-pinyin\">sài wēng shī mǎ, ān zhī fēi fú</span></span> The old man at the border lost his horse. How do we know it was not his luck? He is not telling you it was not a loss. He is telling you that you do not yet know what it was."
      ],
      choices: [
        { label: "Pay the toll. Ride on.", next: "kashgar", chengyu: "saiwengshima" }
      ]
    },

    /* ---------- scene 5: Kashgar — flavor, no chengyu ---------- */
    kashgar: {
      locationCn: "喀什噶爾",
      locationEn: "Kashgar · the Western Gate",
      worldLabel: "WORLD 4-2",
      title: "A Charm in the Bazaar",
      subtitle: "The road is nearly done. This is where it takes your last coin — or doesn't.",
      narration: [
        "In the Sunday bazaar of Kashgar, a Uyghur trader in a green turban offers you a small brass coin on a red cord. A charm, he says, for safe passage through the desert.",
        "It is very cheap. The trader smiles a very wide smile."
      ],
      choices: [
        { label: "Buy it. You've spent silver on worse prayers.", next: "khanbaliq" },
        { label: "Walk on. You have carried yourself this far without help from a cord.", next: "khanbaliq" }
      ]
    },

    /* ---------- scene 6: Khanbaliq — final choice, ending decides variant ---------- */
    khanbaliq: {
      locationCn: "汗八里",
      locationEn: "Khanbaliq · the court of Kublai Khan",
      worldLabel: "WORLD 7-1",
      title: "The Court of the Great Khan",
      subtitle: "You have crossed the world. Do not waste the last ten feet.",
      narration: [
        "The throne room of Kublai Khan is a sea of silk. The Great Khan is old, and his eyes are patient.",
        "An interpreter whispers: the Khan will receive your gifts in private, but only one Venetian knows the proper ceremony. You are that Venetian.",
        "The gifts — a golden drinking cup, a small book of hours bound in red, a sample of Venetian glass — are laid out on a tray before you. You may present them one by one, with a story for each, or you may lay them all out at once and bow.",
        "The Khan's eyes rest on you. He says, in a voice like a slow river: <em>「不患無位，患所以立。」</em><span class=\"inline-pinyin\">bù huàn wú wèi, huàn suǒ yǐ lì</span> Do not worry about the rank; worry about whether you deserve it."
      ],
      choices: [
        { label: "One gift, one story, one bow. Make him wait for each. The Khan has time — you have earned the right to use it.", next: "ending" },
        { label: "Set everything down at once and bow. Perhaps he sees through ceremony. Perhaps he never forgave you for skipping it.", next: "ending" }
      ]
    },

    /* ---------- ending ---------- */
    ending: {
      locationCn: "歸途",
      locationEn: "The long way home",
      worldLabel: "WORLD 8-1",
      title: "The Return",
      subtitle: "The sea is the same. You are not.",
      ending: true,
      narration: [
        "You are forty-one years old. You carry, in a leather satchel that has been repaired in Samarqand, Kashgar, and Hangzhou, a small book — in a language you have taught yourself to write — that tells the story of every mile.",
        "The Great Khan gave you a golden tablet, a <em>paiza</em>, that will open any door between here and the Black Sea. He said, in his slow voice: <em>「回來告訴他們，東方不是夢。」</em><span class=\"inline-pinyin\">huí lái gào sù tā men, dōng fāng bù shì mèng</span> Go back and tell them the East is not a dream.",
        "You will be a prisoner of Genoa for a year, and in a Genoese jail you will dictate your book to a writer of romances. The book will be called <em>Il Milione</em>. It will change the map of the world."
      ]
    }
  };

  /* ===================== state ===================== */
  const state = {
    name: "Marco",
    earnedChengyu: new Set(),  // keys from CHENGYU
    history: []                // scene ids visited
  };

  /* ===================== render ===================== */
  const panel = document.getElementById("panel");

  function renderChengyu(key) {
    const c = CHENGYU[key];
    if (!c) return "";
    state.earnedChengyu.add(key);
    return `
      <div class="chengyu-card" role="note" aria-label="Chengyu lesson: ${c.chars}">
        <p class="label">chengyu · 四字成語</p>
        <p class="chars">${c.chars}</p>
        <p class="pinyin">${c.pinyin}</p>
        <p class="literal"><em>literally —</em> ${c.literal}</p>
        <p class="meaning">${c.meaning}</p>
        <p class="origin">${c.origin}</p>
      </div>
    `;
  }

  function renderPrologue(scene) {
    return `
      ${scene.worldLabel ? `<span class="world-label">${scene.worldLabel}</span>` : ""}
      <div class="location">${scene.locationCn} · ${scene.locationEn}</div>
      <h2 class="scene-title">${scene.title}</h2>
      <div class="prologue-name">
        <label for="nameInput">Your name, traveler:</label>
        <input id="nameInput" type="text" value="Marco" maxlength="24" autocomplete="off" />
      </div>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <button class="continue-btn" id="goAcre">${scene.choices[0].label}</button>
    `;
  }

  function renderScene(scene, sceneId) {
    if (scene.prologue) {
      panel.innerHTML = renderPrologue(scene);
      document.getElementById("nameInput").addEventListener("input", (e) => {
        const v = e.target.value.trim();
        state.name = v || "Marco";
      });
      document.getElementById("goAcre").addEventListener("click", () => {
        document.getElementById("goAcre").style.display = "none";
        const np = panel.querySelector(".prologue-name");
        if (np) np.style.display = "none";
        showChengyuThenAdvance("bujikuibu", scene.choices[0].next);
      });
      return;
    }

    if (scene.ending) {
      panel.innerHTML = renderEnding();
      return;
    }

    const choicesHtml = scene.choices.map((c, i) => {
      return `<li><button class="choice" data-num="${["i", "ii", "iii"][i]}" data-next="${c.next}" data-chengyu="${c.chengyu || ""}">${c.label}</button></li>`;
    }).join("");

    panel.innerHTML = `
      ${scene.worldLabel ? `<span class="world-label">${scene.worldLabel}</span>` : ""}
      <div class="location">${scene.locationCn} · ${scene.locationEn}</div>
      <h2 class="scene-title">${scene.title}</h2>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <ul class="choices">${choicesHtml}</ul>
    `;

    panel.querySelectorAll(".choice").forEach((btn, i) => {
      btn.addEventListener("click", () => {
        const choice = scene.choices[i];
        if (choice.chengyu) {
          showChengyuThenAdvance(choice.chengyu, choice.next);
        } else if (choice.setback) {
          showSetbackThenRetry(choice.setback, sceneId);
        } else if (choice.next) {
          goTo(choice.next);
        }
      });
    });
  }

  function showChengyuThenAdvance(key, next) {
    // insert chengyu card below the choices, with a continue button
    const cardHtml = renderChengyu(key);
    const cont = document.createElement("div");
    cont.innerHTML = cardHtml + `<button class="continue-btn" id="afterChengyu">Continue the journey</button>`;
    panel.appendChild(cont);
    // hide the choices
    const choicesEl = panel.querySelector(".choices");
    if (choicesEl) choicesEl.style.display = "none";
    // scroll card into view
    cont.scrollIntoView({ behavior: "smooth", block: "center" });
    document.getElementById("afterChengyu").addEventListener("click", () => goTo(next));
  }

  function showSetbackThenRetry(paras, sceneId) {
    const block = document.createElement("div");
    block.className = "setback";
    block.innerHTML =
      `<p class="setback-label">— a wrong turning —</p>` +
      paras.map(p => `<p>${p}</p>`).join("") +
      `<button class="continue-btn" id="afterSetback">Try again</button>`;
    panel.appendChild(block);
    const choicesEl = panel.querySelector(".choices");
    if (choicesEl) choicesEl.style.display = "none";
    block.scrollIntoView({ behavior: "smooth", block: "center" });
    document.getElementById("afterSetback").addEventListener("click", () => goTo(sceneId));
  }

  function renderEnding() {
    // glossary — all six idioms, in journey order (every finisher earns all of them)
    const allKeys = ["bujikuibu", "yusuzebuda", "shibangongbei", "saiwengshima", "jiyuqiucheng", "houjibofa"];
    const glossaryHtml = allKeys.map(k => {
      const c = CHENGYU[k];
      const earned = state.earnedChengyu.has(k);
      return `
        <div class="glossary-entry">
          <h3 class="ge-title">${c.chars}${earned ? '<span class="earned">— earned</span>' : '<span class="earned">— not met on this road</span>'}</h3>
          <p class="ge-pinyin">${c.pinyin}</p>
          <p class="ge-row"><b>literally</b> ${c.literal}</p>
          <p class="ge-row"><b>meaning</b> ${c.meaning}</p>
          <p class="ge-row"><b>origin</b> ${c.origin}</p>
        </div>
      `;
    }).join("");

    return `
      ${SCENES.ending.worldLabel ? `<span class="world-label">${SCENES.ending.worldLabel}</span>` : ""}
      <div class="location">${SCENES.ending.locationCn} · ${SCENES.ending.locationEn}</div>
      <h2 class="scene-title">${SCENES.ending.title}</h2>
      <div class="narration">
        ${SCENES.ending.narration.map(p => `<p>${p}</p>`).join("")}
      </div>

      <div class="ending-block">
        <button class="continue-btn" id="restart">Begin the journey again</button>
      </div>

      <section class="glossary" aria-label="Chengyu glossary">
        <h2>成語 · Chengyu Glossary</h2>
        <p class="sub">Six proverbs from the road, and the small stories behind them.</p>
        ${glossaryHtml}
      </section>
    `;
  }

  function goTo(id) {
    state.history.push(id);
    const scene = SCENES[id];
    if (!scene) return;
    document.getElementById("scroll").dataset.scene = id;
    renderScene(scene, id);
    // scroll the panel to the top of the visible area
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  /* ===================== restart ===================== */
  panel.addEventListener("click", (e) => {
    if (e.target && e.target.id === "restart") {
      state.name = "Marco";
      state.earnedChengyu = new Set();
      state.history = [];
      panel.innerHTML = "";
      goTo("start");
    }
  });

  /* ===================== keyboard ===================== */
  document.addEventListener("keydown", (e) => {
    // 1/2/3 to pick a choice in the current scene
    const choices = panel.querySelectorAll(".choice");
    if (choices.length && (e.key === "1" || e.key === "2" || e.key === "3")) {
      const idx = ["1", "2", "3"].indexOf(e.key);
      if (choices[idx]) {
        e.preventDefault();
        choices[idx].click();
      }
    }
    // Enter on prologue advances
    if (document.getElementById("goAcre") && e.key === "Enter") {
      e.preventDefault();
      document.getElementById("goAcre").click();
    }
  });

  /* ===================== boot ===================== */
  goTo("start");
</script>

</body>
</html>
