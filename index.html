<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Travels of Marco Polo — A Chengyu Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #ece3d0;
    --panel:        #faf5ea;
    --ink:          #33291d;
    --text:         #33291d;
    --text-muted:   #5c4f3d;
    --accent:       #8a6516;
    --accent-2:     #c2502a;
    --scene-bg:     #faf5ea;
    --scene-accent: #8a6516;
    --scene-border: #cdb487;

    --font-body:    "Noto Serif SC", "Noto Serif", Georgia, "Times New Roman", serif;
    --font-ui:      ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-display: "Press Start 2P", "Noto Serif SC", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.0625rem;
    line-height: 1.85;
  }

  /* ── per-scene palette overrides ── */
  main[data-scene="start"]     { --scene-bg: #dde8f1; --scene-accent: #1f5d72; --scene-border: #9cc1d4; }
  main[data-scene="acre"]      { --scene-bg: #f3e6cd; --scene-accent: #9c5a22; --scene-border: #d9b483; }
  main[data-scene="hormuz"]    { --scene-bg: #f7e3d0; --scene-accent: #a85327; --scene-border: #e0b48f; }
  main[data-scene="pamir"]     { --scene-bg: #e2ebf0; --scene-accent: #3f5a73; --scene-border: #aac1d2; }
  main[data-scene="kashgar"]   { --scene-bg: #e3eedd; --scene-accent: #3f6b43; --scene-border: #abc9a6; }
  main[data-scene="khanbaliq"] { --scene-bg: #f4e3e1; --scene-accent: #9c3030; --scene-border: #d9aaa6; }
  main[data-scene="ending"]    { --scene-bg: #f1e7d2; --scene-accent: #8a6516; --scene-border: #cdb487; }

  .scroll {
    max-width: 680px;
    margin: 24px auto;
    padding: 32px;
    background: var(--panel);
    border: 1px solid #d8c9a8;
    border-radius: 6px;
    box-shadow: 0 10px 30px rgba(51, 41, 29, 0.18);
    transition: background 400ms ease;
  }

  /* ── header ── */
  header.title {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 4px solid var(--scene-accent, var(--accent));
  }

  header.title h1 {
    font-family: var(--font-display);
    font-size: clamp(1.0rem, 2.8vw, 1.4rem);
    line-height: 1.6;
    margin: 0 0 12px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  header.title .romaji {
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin: 0 0 18px;
    letter-spacing: 0.06em;
  }

  /* ── pixel banner SVG ── */
  .banner {
    width: 100%;
    height: 100px;
    margin: 8px 0 16px;
    display: block;
  }

  /* ── scene panel ── */
  .scene-panel {
    position: relative;
    background: var(--scene-bg);
    padding: 28px 24px 24px;
    border: 1px solid var(--scene-border);
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(51, 41, 29, 0.12);
    min-height: 320px;
    animation: unfurl 400ms ease both;
    transition: background 400ms ease, border-color 400ms ease;
  }

  @keyframes unfurl {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

 
  /* ── location badge ── */
  .location {
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--scene-accent);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    text-transform: uppercase;
    display: block;
  }

  /* ── scene title / subtitle ── */
  .scene-title {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(1.35rem, 3vw, 1.7rem);
    color: var(--scene-accent);
    margin: 0 0 8px;
    line-height: 1.4;
  }

  /* ── narration ── */
  .narration {
    font-size: 1.0625rem;
    color: var(--text);
    margin: 0 0 24px;
    line-height: 1.85;
  }

  .narration p { margin: 0 0 1.1em; }
  .narration p:last-child { margin-bottom: 0; }

  .inline-pinyin {
    font-size: 0.78em;
    font-style: italic;
    color: var(--text-muted);
    margin-left: 0.4em;
  }

  /* ── choices ── */
  .choices {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice {
    width: 100%;
    text-align: left;
    background: #fffdf8;
    border: 2px solid var(--scene-accent);
    border-radius: 5px;
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 1.0625rem;
    line-height: 1.5;
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 2px 6px rgba(51, 41, 29, 0.12);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }

  .choice::before {
    content: attr(data-num) ". ";
    color: var(--scene-accent);
    font-weight: 700;
    margin-right: 6px;
  }

  .choice:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(51, 41, 29, 0.18);
    background: #fff;
  }

  .choice:focus-visible {
    outline: 3px solid var(--scene-accent);
    outline-offset: 2px;
  }

  /* ── chengyu card ── */
  .chengyu-card {
    margin: 24px 0;
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 20px 22px 18px;
    background: #fdf6e3;
    position: relative;
    box-shadow: 0 6px 16px rgba(138, 101, 22, 0.18);
    animation: stamp 500ms cubic-bezier(.2,.7,.2,1) both;
  }

  @keyframes stamp {
    0%   { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }

  .chengyu-card::after {
    content: "★";
    position: absolute;
    top: -14px;
    right: -14px;
    width: 36px;
    height: 36px;
    background: var(--accent);
    color: #fff;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: 0 2px 5px rgba(138, 101, 22, 0.3);
  }

  .chengyu-card .label {
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 0 0 10px;
  }

  .chengyu-card .chars {
    font-family: "Noto Serif SC", serif;
    font-weight: 600;
    font-size: 2.2rem;
    color: #6f4e12;
    margin: 0 0 4px;
    letter-spacing: 0.08em;
  }

  .chengyu-card .pinyin {
    font-style: italic;
    font-size: 1.0rem;
    color: var(--text-muted);
    margin: 0 0 14px;
  }

  .chengyu-card .literal {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin: 0 0 10px;
  }

  .chengyu-card .meaning {
    font-size: 1rem;
    color: var(--text);
    margin: 0 0 12px;
    line-height: 1.7;
  }

  .chengyu-card .origin {
    font-size: 0.9rem;
    color: var(--text-muted);
    border-top: 1px solid rgba(138, 101, 22, 0.25);
    padding-top: 10px;
    margin: 0;
    line-height: 1.65;
  }

  .chengyu-card .origin::before {
    content: "origin · ";
    color: var(--accent);
    font-style: italic;
    letter-spacing: 0.06em;
  }

  /* ── continue button ── */
  .continue-btn {
    margin-top: 20px;
    background: var(--scene-accent);
    border: 0;
    border-radius: 5px;
    color: #fff;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    padding: 11px 18px;
    transition: filter 120ms ease, transform 120ms ease;
  }

  .continue-btn::after { content: " ▶"; }
  .continue-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .continue-btn:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }

  /* ── prologue name input ── */
  .prologue-name {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0 26px;
    flex-wrap: wrap;
  }

  .prologue-name label {
    font-family: var(--font-ui);
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .prologue-name input {
    background: #fffdf8;
    border: 2px solid var(--scene-accent);
    border-radius: 5px;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 1.0625rem;
    padding: 8px 10px;
    width: 200px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(51, 41, 29, 0.1);
  }

  .prologue-name input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(51, 41, 29, 0.15); }

  /* ── ending block ── */
  .ending-block {
    text-align: center;
    margin: 24px 0 36px;
    padding: 20px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    background: #fdf6e3;
    box-shadow: 0 6px 16px rgba(138, 101, 22, 0.15);
  }

  .ending-block .ending-title {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(1.1rem, 2.4vw, 1.4rem);
    color: var(--accent);
    margin: 0 0 8px;
  }

  .ending-block .ending-sub {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0 0 16px;
  }

  .ending-block .ending-blurb {
    max-width: 480px;
    margin: 0 auto;
    color: var(--text);
    font-size: 0.95rem;
  }

  /* ── glossary ── */
  .glossary {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 2px solid var(--accent);
  }

  .glossary h2 {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(1.15rem, 2.4vw, 1.4rem);
    color: var(--accent);
    margin: 0 0 6px;
  }

  .glossary .sub {
    font-style: italic;
    color: var(--text-muted);
    margin: 0 0 26px;
    font-size: 0.95rem;
  }

  .glossary-entry {
    margin: 0 0 28px;
    padding: 0 0 0 14px;
    border-left: 3px solid var(--accent);
  }

  .glossary-entry .ge-title {
    font-family: "Noto Serif SC", serif;
    font-size: 1.3rem;
    color: var(--accent);
    margin: 0 0 2px;
  }

  .glossary-entry .ge-pinyin {
    font-style: italic;
    color: var(--text-muted);
    margin: 0 0 10px;
    font-size: 0.95rem;
  }

  .glossary-entry .ge-row {
    font-size: 0.95rem;
    color: var(--text);
    margin: 0 0 4px;
    line-height: 1.6;
  }

  .glossary-entry .ge-row b {
    color: var(--accent);
    font-weight: 600;
    margin-right: 6px;
    font-size: 0.82rem;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* ── earned badge ── */
  .earned {
    display: inline-block;
    color: var(--accent);
    font-style: italic;
    font-size: 0.82rem;
    margin-left: 8px;
  }

  /* ── chengyu tooltip ── */
  .chengyu-tip {
    cursor: help;
    text-decoration: underline dotted var(--scene-accent);
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
  }

  #chengyu-tooltip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    display: none;
    max-width: 300px;
    background: #fdf6e3;
    color: var(--ink);
    border: 2px solid var(--accent);
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(51, 41, 29, 0.25);
    padding: 12px 14px;
    font-family: var(--font-ui);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  #chengyu-tooltip table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 8px;
  }

  #chengyu-tooltip td {
    padding: 2px 6px 2px 0;
    border-bottom: 1px solid rgba(138, 101, 22, 0.2);
    vertical-align: top;
  }

  #chengyu-tooltip td:first-child {
    font-family: "Noto Serif SC", serif;
    font-size: 1rem;
    color: #6f4e12;
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip td:nth-child(2) {
    font-style: italic;
    color: var(--text-muted);
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip .tip-translation {
    color: var(--accent);
    border-top: 1px solid rgba(138, 101, 22, 0.3);
    padding-top: 6px;
    margin-top: 2px;
    font-style: italic;
    font-size: 0.88rem;
  }

  /* ── setback ("wrong turning") block ── */
  .setback {
    margin-top: 20px;
    padding: 16px 18px;
    border-left: 4px solid var(--accent-2);
    border-radius: 4px;
    background: rgba(194, 80, 42, 0.08);
  }

  .setback-label {
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-2);
    margin: 0 0 10px;
  }

  .setback p {
    font-size: 1.0625rem;
    line-height: 1.8;
    color: var(--ink);
    margin: 0 0 1em;
  }

  /* ── mobile ── */
  @media (max-width: 600px) {
    .scroll { padding: 20px; margin: 0; border-radius: 0; }
    .scene-title { font-size: 1.25rem; }
    .glossary h2 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<main class="scroll" id="scroll">

  <header class="title">
    <h1>馬可波羅遊記</h1>
    <p class="romaji">The Travels of Marco Polo &middot; a chengyu scroll</p>

    <svg class="banner" viewBox="0 0 640 100" preserveAspectRatio="none" role="img" aria-label="A skyline blending a Venetian bell-tower, Persian domes and minarets, and a Chinese pagoda above a city wall.">
      <rect width="640" height="100" fill="var(--scene-bg, #faf5ea)"/>
      <!-- low sun -->
      <circle cx="118" cy="24" r="12" fill="var(--scene-accent, #8a6516)" opacity="0.28"/>
      <!-- far ridge -->
      <polygon points="0,80 80,46 150,70 220,36 300,62 380,30 460,58 540,26 620,60 640,50 640,80" fill="var(--scene-accent, #8a6516)" opacity="0.15"/>
      <!-- near ridge -->
      <polygon points="0,80 120,58 200,72 320,50 420,68 540,48 640,66 640,80" fill="var(--scene-accent, #8a6516)" opacity="0.24"/>
      <g fill="var(--scene-accent, #8a6516)">

        <path opacity="0.9" d="M0,74 L16,74 L16,80 L32,80 L32,74 L48,74 L48,80 L64,80 L64,74 L80,74 L80,80 L96,80 L96,74 L112,74 L112,80 L128,80 L128,74 L144,74 L144,80 L160,80 L160,74 L176,74 L176,80 L192,80 L192,74 L208,74 L208,80 L224,80 L224,74 L240,74 L240,80 L256,80 L256,74 L272,74 L272,80 L288,80 L288,74 L304,74 L304,80 L320,80 L320,74 L336,74 L336,80 L352,80 L352,74 L368,74 L368,80 L384,80 L384,74 L400,74 L400,80 L416,80 L416,74 L432,74 L432,80 L448,80 L448,74 L464,74 L464,80 L480,80 L480,74 L496,74 L496,80 L512,80 L512,74 L528,74 L528,80 L544,80 L544,74 L560,74 L560,80 L576,80 L576,74 L592,74 L592,80 L608,80 L608,74 L624,74 L624,80 L640,80 L640,100 L0,100 Z"/>
        <!-- Venice: campanile -->
        <g opacity="0.92">
          <rect x="48" y="26" width="18" height="54"/>

          <polygon points="44,20 57,4 70,20"/>
          <rect x="55" y="0" width="4" height="5"/>

        <!-- Persia: domes and minarets -->

          <rect x="240" y="58" width="26" height="22"/>
          <path d="M240,58 C240,45 253,39 253,39 C253,39 266,45 266,58 Z"/>
          <rect x="284" y="34" width="7" height="46"/>
          <rect x="282" y="44" width="11" height="2"/>
          <path d="M284,34 C284,27 291,27 291,34 Z"/>
          <rect x="300" y="44" width="44" height="36"/>
          <path d="M300,44 C300,22 312,10 322,4 C332,10 344,22 344,44 Z"/>
          <circle cx="322" cy="3" r="2"/>
          <rect x="353" y="34" width="7" height="46"/>
          <rect x="351" y="44" width="11" height="2"/>
          <path d="M353,34 C353,27 360,27 360,34 Z"/>
        </g>
        <!-- Cathay: pagoda -->
        <g opacity="0.92">
          <rect x="518" y="64" width="44" height="16"/>
          <path d="M504,64 Q512,68 524,60 L540,54 L556,60 Q568,68 576,64 Z"/>
          <rect x="524" y="50" width="32" height="14"/>
          <path d="M514,50 Q521,54 531,46 L540,42 L549,46 Q559,54 566,50 Z"/>
          <rect x="530" y="38" width="20" height="12"/>
          <path d="M522,38 Q528,42 535,34 L540,31 L545,34 Q552,42 558,38 Z"/>

          <circle cx="540" cy="23" r="2"/>
        </g>
      </g>
    </svg>

  </header>

  <!-- the scene panel — JS swaps its contents -->
  <section class="scene-panel" id="panel" aria-live="polite"></section>


</main>

<div id="chengyu-tooltip" role="tooltip" aria-hidden="true"></div>

<script>
  /* ===================== chengyu data ===================== */
  const CHENGYU = {
    bujikuibu: {
      chars:    "不積跬步",
      pinyin:   "bù jī kuǐ bù, wú yǐ zhì qiān lǐ",
      literal:  "Without piling up half-steps, there is no reaching a thousand li.",
      meaning:  "Distance is not crossed in leaps. Every thousand-li road is only ever the sum of single, unglamorous steps — and the first one is the whole journey in miniature.",
      origin:   "From 《荀子·勸學》: 「不積跬步，無以至千里；不積小流，無以成江海。」— Without half-steps, no thousand li; without small streams, no rivers and seas.",
      chars_breakdown: [
        {char:"不", pinyin:"bù", meaning:"not / without"},
        {char:"積", pinyin:"jī", meaning:"to accumulate, pile up"},
        {char:"跬", pinyin:"kuǐ", meaning:"a half-step (one pace)"},
        {char:"步", pinyin:"bù", meaning:"a step, a pace"}
      ]
    },
    shibangongbei: {
      chars:    "事半功倍",
      pinyin:   "shì bàn gōng bèi",
      literal:  "Half the work, twice the result.",
      meaning:  "The smartest path is rarely the hardest one. Skill and method outrun brute effort every time.",
      origin:   "From 《孟子·盡心上》: 「故事半古之人，功必倍之。」— Those who use the methods of the ancients achieve double the result with half the effort.",
      chars_breakdown: [
        {char:"事", pinyin:"shì", meaning:"effort / task"},
        {char:"半", pinyin:"bàn", meaning:"half"},
        {char:"功", pinyin:"gōng", meaning:"achievement"},
        {char:"倍", pinyin:"bèi", meaning:"double"}
      ]
    },
    saiwengshima: {
      chars:    "塞翁失馬",
      pinyin:   "sài wēng shī mǎ",
      literal:  "The old man at the border loses his horse.",
      meaning:  "You cannot know yet whether this is bad news. What looks like loss has a way of turning itself inside out.",
      origin:   "From 《淮南子·人間訓》: an old man's horse runs away; neighbors pity him. The horse returns with a herd of wild horses, and they congratulate him. When his son breaks his leg riding one, they pity him again — but the conscription comes, and the son is spared.",
      chars_breakdown: [
        {char:"塞", pinyin:"sài", meaning:"frontier fort"},
        {char:"翁", pinyin:"wēng", meaning:"old man"},
        {char:"失", pinyin:"shī", meaning:"to lose"},
        {char:"馬", pinyin:"mǎ", meaning:"horse"}
      ]
    },
    houjibofa: {
      chars:   "厚積薄發",
      pinyin:  "hòu jī bó fā",
      literal: "Accumulate deep; release sparingly.",
      meaning: "What looks thin on the surface is the product of a long, quiet preparation. The depth shows itself only when the moment demands it.",
      origin:  "From Su Shi's 《稼說》: 「博觀而約取，厚積而薄發。」— 'Read widely and take little; accumulate much and release sparingly.' HSK 6 confirmed; gaokao favorite.",
      chars_breakdown: [
        {char:"厚", pinyin:"hòu", meaning:"thick, deep, substantial"},
        {char:"積", pinyin:"jī",  meaning:"accumulate, store up"},
        {char:"薄", pinyin:"bó",  meaning:"thin, little, sparse"},
        {char:"發", pinyin:"fā",  meaning:"release, express, send out"}
      ]
    },

  /* ===================== tooltip ===================== */
  const tooltip = document.getElementById("chengyu-tooltip");

  function buildTooltipHtml(key) {
    const c = CHENGYU[key];
    if (!c || !c.chars_breakdown) return "";
    const rows = c.chars_breakdown.map(b =>
      `<tr><td>${b.char}</td><td>${b.pinyin}</td><td>${b.meaning}</td></tr>`
    ).join("");
    return `<table>${rows}</table><div class="tip-translation">${c.literal}</div>`;
  }

  function positionTooltip(x, y) {
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight, GAP = 12;
    let lx = x + GAP, ly = y + GAP;
    if (lx + tw > window.innerWidth - 8)  lx = x - tw - GAP;
    if (ly + th > window.innerHeight - 8) ly = y - th - GAP;
    tooltip.style.left = lx + "px";
    tooltip.style.top  = ly + "px";
  }

  document.addEventListener("mouseover", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
    positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mousemove", e => {
    if (tooltip.style.display === "block") positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mouseout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    if (e.relatedTarget && e.relatedTarget.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  document.addEventListener("focusin", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    const r = tip.getBoundingClientRect();
    tooltip.style.left = r.left + "px";
    tooltip.style.top  = (r.bottom + 8) + "px";
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
  });

  document.addEventListener("focusout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  /* ===================== state ===================== */
  const state = {
    name: "Marco",
    earnedChengyu: new Set(),  // keys from CHENGYU
    history: []                // scene ids visited
  };

  /* ===================== render ===================== */
  const panel = document.getElementById("panel");

  function renderChengyu(key) {
    const c = CHENGYU[key];
    if (!c) return "";
    state.earnedChengyu.add(key);
    return `
      <div class="chengyu-card" role="note" aria-label="Chengyu lesson: ${c.chars}">
        <p class="label">chengyu · 四字成語</p>
        <p class="chars">${c.chars}</p>
        <p class="pinyin">${c.pinyin}</p>
        <p class="literal"><em>literally —</em> ${c.literal}</p>
        <p class="meaning">${c.meaning}</p>
        <p class="origin">${c.origin}</p>
      </div>
    `;
  }

  function renderPrologue(scene) {
    return `
      ${scene.worldLabel ? `<span class="world-label">${scene.worldLabel}</span>` : ""}
      <div class="location">${scene.locationCn} · ${scene.locationEn}</div>
      <h2 class="scene-title">${scene.title}</h2>
      <div class="prologue-name">
        <label for="nameInput">Your name, traveler:</label>
        <input id="nameInput" type="text" value="Marco" maxlength="24" autocomplete="off" />
      </div>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <button class="continue-btn" id="goAcre">${scene.choices[0].label}</button>
    `;
  }

  function renderScene(scene, sceneId) {
    if (scene.prologue) {
      panel.innerHTML = renderPrologue(scene);
      document.getElementById("nameInput").addEventListener("input", (e) => {
        const v = e.target.value.trim();
        state.name = v || "Marco";
      });
      document.getElementById("goAcre").addEventListener("click", () => {
        document.getElementById("goAcre").style.display = "none";
        const np = panel.querySelector(".prologue-name");
        if (np) np.style.display = "none";
        showChengyuThenAdvance("bujikuibu", scene.choices[0].next);
      });
      return;
    }

    if (scene.ending) {
      panel.innerHTML = renderEnding();
      return;
    }

    const choicesHtml = scene.choices.map((c, i) => {
      return `<li><button class="choice" data-num="${["i", "ii", "iii"][i]}" data-next="${c.next}" data-chengyu="${c.chengyu || ""}">${c.label}</button></li>`;
    }).join("");

    panel.innerHTML = `
      ${scene.worldLabel ? `<span class="world-label">${scene.worldLabel}</span>` : ""}
      <div class="location">${scene.locationCn} · ${scene.locationEn}</div>
      <h2 class="scene-title">${scene.title}</h2>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <ul class="choices">${choicesHtml}</ul>
    `;

    panel.querySelectorAll(".choice").forEach((btn, i) => {
      btn.addEventListener("click", () => {
        const choice = scene.choices[i];
        if (choice.chengyu) {
          showChengyuThenAdvance(choice.chengyu, choice.next);
        } else if (choice.setback) {
          showSetbackThenRetry(choice.setback, sceneId);
        } else if (choice.next) {
          goTo(choice.next);
        }
      });
    });
  }

  function showChengyuThenAdvance(key, next) {
    // insert chengyu card below the choices, with a continue button
    const cardHtml = renderChengyu(key);
    const cont = document.createElement("div");
    cont.innerHTML = cardHtml + `<button class="continue-btn" id="afterChengyu">Continue the journey</button>`;
    panel.appendChild(cont);
    // hide the choices
    const choicesEl = panel.querySelector(".choices");
    if (choicesEl) choicesEl.style.display = "none";
    // scroll card into view
    cont.scrollIntoView({ behavior: "smooth", block: "center" });
    document.getElementById("afterChengyu").addEventListener("click", () => goTo(next));
  }

  function showSetbackThenRetry(paras, sceneId) {
    const block = document.createElement("div");
    block.className = "setback";
    block.innerHTML =
      `<p class="setback-label">— a wrong turning —</p>` +
      paras.map(p => `<p>${p}</p>`).join("") +
      `<button class="continue-btn" id="afterSetback">Try again</button>`;
    panel.appendChild(block);
    const choicesEl = panel.querySelector(".choices");
    if (choicesEl) choicesEl.style.display = "none";
    block.scrollIntoView({ behavior: "smooth", block: "center" });
    document.getElementById("afterSetback").addEventListener("click", () => goTo(sceneId));
  }

  function renderEnding() {
    // glossary — all six idioms, in journey order (every finisher earns all of them)
    const allKeys = ["bujikuibu", "yusuzebuda", "shibangongbei", "saiwengshima", "sengduozhoushao", "houjibofa"];
    const glossaryHtml = allKeys.map(k => {
      const c = CHENGYU[k];
      const earned = state.earnedChengyu.has(k);
      return `
        <div class="glossary-entry">
          <h3 class="ge-title">${c.chars}${earned ? '<span class="earned">— earned</span>' : '<span class="earned">— not met on this road</span>'}</h3>
          <p class="ge-pinyin">${c.pinyin}</p>
          <p class="ge-row"><b>literally</b> ${c.literal}</p>
          <p class="ge-row"><b>meaning</b> ${c.meaning}</p>
          <p class="ge-row"><b>origin</b> ${c.origin}</p>
        </div>
      `;
    }).join("");

    return `
      ${SCENES.ending.worldLabel ? `<span class="world-label">${SCENES.ending.worldLabel}</span>` : ""}
      <div class="location">${SCENES.ending.locationCn} · ${SCENES.ending.locationEn}</div>
      <h2 class="scene-title">${SCENES.ending.title}</h2>
      <div class="narration">
        ${SCENES.ending.narration.map(p => `<p>${p}</p>`).join("")}
      </div>

      <div class="ending-block">
        <button class="continue-btn" id="restart">Begin the journey again</button>
      </div>

      <section class="glossary" aria-label="Chengyu glossary">
        <h2>成語 · Chengyu Glossary</h2>
        <p class="sub">Six proverbs from the road, and the small stories behind them.</p>
        ${glossaryHtml}
      </section>
    `;
  }

  function goTo(id) {
    state.history.push(id);
    const scene = SCENES[id];
    if (!scene) return;
    document.getElementById("scroll").dataset.scene = id;
    renderScene(scene, id);
    // scroll the panel to the top of the visible area
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  /* ===================== restart ===================== */
  panel.addEventListener("click", (e) => {
    if (e.target && e.target.id === "restart") {
      state.name = "Marco";
      state.earnedChengyu = new Set();
      state.history = [];
      panel.innerHTML = "";
      goTo("start");
    }
  });

  /* ===================== keyboard ===================== */
  document.addEventListener("keydown", (e) => {
    // 1/2/3 to pick a choice in the current scene
    const choices = panel.querySelectorAll(".choice");
    if (choices.length && (e.key === "1" || e.key === "2" || e.key === "3")) {
      const idx = ["1", "2", "3"].indexOf(e.key);
      if (choices[idx]) {
        e.preventDefault();
        choices[idx].click();
      }
    }
    // Enter on prologue advances
    if (document.getElementById("goAcre") && e.key === "Enter") {
      e.preventDefault();
      document.getElementById("goAcre").click();
    }
  });

  /* ===================== boot ===================== */
  goTo("start");
</script>

</body>
</html>
