<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Travels of Marco Polo — A Chengyu Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet" />
<style>
  :root {
    /* aged-rice-paper palette, 山水画 */
    --paper:       #F4ECD8;
    --paper-deep:  #E8DEC2;
    --paper-edge:  #D9CBA6;
    --ink:         #1B1A17;
    --ink-soft:    #5C574E;
    --ink-faint:   #8A857C;
    --seal:        #9C2A1F;   /* cinnabar / 朱砂 */
    --seal-deep:   #7A1F18;
    --mineral:     #5A7A8C;
    --gilt:        #A88A4A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Serif", "Noto Serif SC", Georgia, serif;
    line-height: 1.85;
    /* faint paper grain via two subtle radial washes */
    background-image:
      radial-gradient(1400px 800px at 50% -10%, rgba(216, 200, 158, 0.35), transparent 60%),
      radial-gradient(900px 600px at 80% 110%, rgba(216, 200, 158, 0.30), transparent 60%);
    background-attachment: fixed;
  }

  body::before {
    /* very faint horizontal striations — evokes rice paper fibers */
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(27, 26, 23, 0.012) 0 1px,
      transparent 1px 4px
    );
    z-index: 0;
  }

  .scroll {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 36px 96px 72px;   /* extra left margin = scroll mounting edge */
    z-index: 1;
  }

  /* the left "mounting edge" line of the scroll */
  .scroll::before {
    content: "";
    position: absolute;
    top: 24px;
    bottom: 24px;
    left: 48px;
    width: 1px;
    background: var(--ink-faint);
    opacity: 0.35;
  }

  /* header — the hanging scroll's title cartouche */
  header.title {
    text-align: center;
    margin-bottom: 56px;
    position: relative;
  }

  header.title h1 {
    font-family: "Ma Shan Zheng", "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 4.4rem;
    line-height: 1.1;
    margin: 0 0 8px;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  header.title .romaji {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    margin: 0 0 22px;
  }

  header.title .seal-strip {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
  }

  .seal-strip .stamp {
    display: inline-block;
    background: var(--seal);
    color: var(--paper);
    font-family: "Noto Serif SC", serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 4px 6px;
    letter-spacing: 0.05em;
    transform: rotate(-2deg);
  }
  .seal-strip .stamp:nth-child(2) { transform: rotate(1.5deg); }
  .seal-strip .stamp:nth-child(3) { transform: rotate(-1deg); }

  /* faint brushed mountain silhouette as page banner */
  .banner {
    width: 100%;
    height: 110px;
    margin: 14px 0 28px;
    display: block;
    opacity: 0.55;
  }

  /* the scene panel — a single piece of paper, contents swapped by JS */
  .scene-panel {
    position: relative;
    background: transparent;
    padding: 32px 0 24px;
    min-height: 360px;
    animation: unfurl 520ms ease both;
  }
  @keyframes unfurl {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* the vertical "location" label — written top-to-bottom in red, like a cartouche */
  .location {
    position: absolute;
    left: -32px;
    top: 28px;
    writing-mode: vertical-rl;
    text-orientation: upright;
    font-family: "Noto Serif SC", serif;
    font-size: 0.95rem;
    color: var(--seal);
    letter-spacing: 0.25em;
    border-left: 2px solid var(--seal);
    padding-left: 8px;
    line-height: 1.4;
    max-height: 200px;
  }
  .location .en {
    display: block;
    writing-mode: horizontal-tb;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    margin-top: 10px;
    border-left: 0;
    padding-left: 0;
    text-transform: uppercase;
  }

  .scene-title {
    font-family: "Ma Shan Zheng", "Noto Serif SC", serif;
    font-size: 2.9rem;
    color: var(--ink);
    margin: 0 0 6px;
    line-height: 1.25;
  }
  .scene-subtitle {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin: 0 0 24px;
    letter-spacing: 0.04em;
  }

  .narration {
    font-size: 1.08rem;
    color: var(--ink);
    margin: 0 0 28px;
  }
  .narration p { margin: 0 0 1.1em; }
  .narration p:last-child { margin-bottom: 0; }
  .inline-pinyin { font-size: 0.78em; font-style: italic; color: var(--text-muted); margin-left: 0.4em; }

  /* ink-brushed choice buttons */
  .choices {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .choice {
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font: inherit;
    font-size: 1.0rem;
    line-height: 1.6;
    padding: 14px 18px;
    cursor: pointer;
    position: relative;
    transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
  }
  .choice::before {
    /* a small numeral in red, like a list marker */
    content: attr(data-num);
    color: var(--seal);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 0.95rem;
    margin-right: 10px;
  }
  .choice:hover, .choice:focus-visible {
    background: var(--paper-deep);
    border-color: var(--seal);
    outline: none;
  }
  .choice:hover::after, .choice:focus-visible::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--seal);
  }

  /* the chengyu "lesson card" — stamped onto the scroll */
  .chengyu-card {
    margin: 24px 0;
    border: 3px double var(--seal);
    padding: 22px 26px 20px;
    background: rgba(255, 255, 255, 0.18);
    position: relative;
    animation: stamp 600ms cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes stamp {
    0%   { opacity: 0; transform: scale(0.96) rotate(-0.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .chengyu-card::after {
    /* the small red square seal in the top-right corner */
    content: "印";
    position: absolute;
    top: -14px;
    right: -14px;
    width: 38px;
    height: 38px;
    background: var(--seal);
    color: var(--paper);
    font-family: "Noto Serif SC", serif;
    font-weight: 600;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(8deg);
    letter-spacing: 0;
  }
  .chengyu-card .label {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 1.78rem;
    color: var(--seal);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin: 0 0 8px;
  }
  .chengyu-card .chars {
    font-family: "Noto Serif SC", serif;
    font-size: 2.4rem;
    color: var(--ink);
    margin: 0 0 4px;
    letter-spacing: 0.08em;
  }
  .chengyu-card .pinyin {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }
  .chengyu-card .literal {
    font-size: 1.92rem;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }
  .chengyu-card .meaning {
    font-size: 2.02rem;
    color: var(--ink);
    margin: 0 0 12px;
    line-height: 1.7;
  }
  .chengyu-card .origin {
    font-size: 1.88rem;
    color: var(--ink-soft);
    border-top: 1px solid rgba(156, 42, 31, 0.25);
    padding-top: 10px;
    margin: 0;
    line-height: 1.65;
  }
  .chengyu-card .origin::before {
    content: "源 · origin · ";
    color: var(--seal);
    font-style: italic;
    letter-spacing: 0.08em;
  }

  .continue-btn {
    margin-top: 22px;
    background: transparent;
    border: 0;
    color: var(--seal);
    font: inherit;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 1.0rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    padding: 8px 4px;
  }
  .continue-btn::after { content: " →"; }
  .continue-btn:hover { color: var(--seal-deep); }

  /* the prologue — name entry */
  .prologue-name {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0 26px;
    flex-wrap: wrap;
  }
  .prologue-name label {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 1rem;
  }
  .prologue-name input {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--ink);
    color: var(--ink);
    font: inherit;
    font-size: 1.05rem;
    padding: 4px 6px;
    width: 200px;
    outline: none;
  }
  .prologue-name input:focus { border-bottom-color: var(--seal); }

  /* ending + glossary */
  .ending-block {
    text-align: center;
    margin: 24px 0 36px;
  }
  .ending-block .ending-title {
    font-family: "Ma Shan Zheng", "Noto Serif SC", serif;
    font-size: 2.4rem;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .ending-block .ending-sub {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--seal);
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0 0 18px;
  }
  .ending-block .ending-blurb {
    max-width: 480px;
    margin: 0 auto;
    color: var(--ink-soft);
  }

  .glossary {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--ink-faint);
  }
  .glossary h2 {
    font-family: "Ma Shan Zheng", "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 2.7rem;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .glossary .sub {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    margin: 0 0 28px;
  }

  .glossary-entry {
    margin: 0 0 32px;
    padding: 0 0 0 14px;
    border-left: 2px solid var(--seal);
  }
  .glossary-entry .ge-title {
    font-family: "Noto Serif SC", serif;
    font-size: 2.4rem;
    color: var(--ink);
    margin: 0 0 2px;
  }
  .glossary-entry .ge-pinyin {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }
  .glossary-entry .ge-row {
    font-size: 0.95rem;
    color: var(--ink);
    margin: 0 0 4px;
  }
  .glossary-entry .ge-row b {
    color: var(--seal);
    font-weight: 600;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    margin-right: 6px;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  /* tiny bottom seal — 馬可波羅 */
  footer.seal {
    margin-top: 64px;
    text-align: center;
  }
  footer.seal .square {
    display: inline-block;
    background: var(--seal);
    color: var(--paper);
    font-family: "Noto Serif SC", serif;
    font-weight: 600;
    font-size: 0.85rem;
    width: 64px;
    height: 64px;
    line-height: 64px;
    text-align: center;
    letter-spacing: 0;
    transform: rotate(-3deg);
    box-shadow: 0 0 0 2px var(--paper) inset, 0 0 0 3px var(--seal) inset;
  }
  footer.seal .caption {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.85rem;
    margin-top: 14px;
    letter-spacing: 0.1em;
  }

  .earned {
    display: inline-block;
    color: var(--seal);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 0.85rem;
    margin-left: 8px;
  }

  .chengyu-tip {
    cursor: help;
    text-decoration: underline dotted var(--seal);
    text-underline-offset: 3px;
  }

  #chengyu-tooltip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    display: none;
    max-width: 280px;
    background: #1B1A17;
    color: #F4ECD8;
    border: 2px solid var(--seal);
    padding: 12px 14px;
    font-family: "Noto Serif", "Noto Serif SC", Georgia, serif;
    font-size: 0.82rem;
    line-height: 1.7;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  }

  #chengyu-tooltip table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 8px;
  }

  #chengyu-tooltip td {
    padding: 2px 8px 2px 0;
    border-bottom: 1px solid rgba(156, 42, 31, 0.2);
    vertical-align: top;
  }

  #chengyu-tooltip td:first-child {
    font-family: "Noto Serif SC", serif;
    font-size: 1.1rem;
    color: var(--seal);
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip td:nth-child(2) {
    font-style: italic;
    color: var(--ink-soft);
    white-space: nowrap;
    padding-right: 10px;
  }

  #chengyu-tooltip .tip-translation {
    color: var(--seal);
    border-top: 1px solid rgba(156, 42, 31, 0.25);
    padding-top: 6px;
    margin-top: 2px;
    font-style: italic;
    font-size: 0.88rem;
  }

  /* mobile */
  @media (max-width: 640px) {
    .scroll { padding: 36px 20px 64px 56px; }
    .scroll::before { left: 32px; }
    header.title h1 { font-size: 2.4rem; }
    .location { left: -28px; font-size: 0.82rem; }
    .scene-title { font-size: 1.5rem; }
    .chengyu-card .chars { font-size: 2rem; }
  }
</style>
</head>
<body>

<main class="scroll" id="scroll">

  <header class="title">
    <h1>馬可波羅遊記</h1>
    <p class="romaji">The Travels of Marco Polo &middot; a chengyu scroll</p>

    <!-- a faint, single-stroke mountain banner — like the far edge of a Ni Zan landscape -->
    <svg class="banner" viewBox="0 0 640 110" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="mist" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"   stop-color="#5C574E" stop-opacity="0.0"/>
          <stop offset="60%"  stop-color="#5C574E" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#5C574E" stop-opacity="0.75"/>
        </linearGradient>
      </defs>
      <path d="M0,90 L40,70 L80,78 L120,52 L160,68 L200,40 L240,58 L290,28 L340,52 L380,30 L430,60 L480,42 L530,66 L580,46 L640,72 L640,110 L0,110 Z"
            fill="url(#mist)" stroke="#1B1A17" stroke-opacity="0.18" stroke-width="0.5"/>
      <path d="M0,98 L60,88 L130,92 L200,82 L280,90 L360,84 L440,92 L520,86 L640,94"
            fill="none" stroke="#1B1A17" stroke-opacity="0.22" stroke-width="0.6"/>
    </svg>

    <div class="seal-strip" aria-hidden="true">
      <span class="stamp">事半功倍</span>
      <span class="stamp">塞翁失馬</span>
      <span class="stamp">厚積薄發</span>
    </div>
  </header>

  <!-- the scene panel — JS swaps its contents -->
  <section class="scene-panel" id="panel" aria-live="polite"></section>

  <footer class="seal" aria-hidden="true">
    <div class="square">馬可<br>波羅</div>
    <div class="caption">— fin. —</div>
  </footer>

</main>

<div id="chengyu-tooltip" role="tooltip" aria-hidden="true"></div>

<script>
  /* ===================== chengyu data ===================== */
  const CHENGYU = {
    shibangongbei: {
      chars:    "事半功倍",
      pinyin:   "shì bàn gōng bèi",
      literal:  "Half the work, twice the result.",
      meaning:  "A wise method accomplishes more with less effort. Work smarter, not harder.",
      origin:   "From 《孟子·盡心上》: 「故事半古之人，功必倍之。」— Those who use the methods of the ancients achieve double the result with half the effort.",
      chars_breakdown: [
        {char:"事", pinyin:"shì", meaning:"effort / task"},
        {char:"半", pinyin:"bàn", meaning:"half"},
        {char:"功", pinyin:"gōng", meaning:"achievement"},
        {char:"倍", pinyin:"bèi", meaning:"double"}
      ]
    },
    saiwengshima: {
      chars:    "塞翁失馬",
      pinyin:   "sài wēng shī mǎ",
      literal:  "The old man at the border loses his horse.",
      meaning:  "A misfortune may turn out to be a blessing; fortune is uncertain and often reverses.",
      origin:   "From 《淮南子·人間訓》: an old man's horse runs away; neighbors pity him. The horse returns with a herd of wild horses, and they congratulate him. When his son breaks his leg riding one, they pity him again — but the conscription comes, and the son is spared.",
      chars_breakdown: [
        {char:"塞", pinyin:"sài", meaning:"frontier fort"},
        {char:"翁", pinyin:"wēng", meaning:"old man"},
        {char:"失", pinyin:"shī", meaning:"to lose"},
        {char:"馬", pinyin:"mǎ", meaning:"horse"}
      ]
    },
    houjibofa: {
      chars:   "厚積薄發",
      pinyin:  "hòu jī bó fā",
      literal: "Accumulate deep; release sparingly.",
      meaning: "Great preparation, quietly built, leads to great outcomes. True resources grow slowly and are spent wisely.",
      origin:  "From Su Shi's 《稼說》: 「博觀而約取，厚積而薄發。」— 'Read widely and take little; accumulate much and release sparingly.' HSK 6 confirmed; gaokao favorite.",
      chars_breakdown: [
        {char:"厚", pinyin:"hòu", meaning:"thick, deep, substantial"},
        {char:"積", pinyin:"jī",  meaning:"accumulate, store up"},
        {char:"薄", pinyin:"bó",  meaning:"thin, little, sparse"},
        {char:"發", pinyin:"fā",  meaning:"release, express, send out"}
      ]
    },
    jiyuqiucheng: {
      chars: "急於求成",
      pinyin: "jí yú qiú chéng",
      literal: "Urgent to achieve success.",
      meaning: "Hasty in seeking results; impatience that causes its own failure.",
      origin: "Common in classical Chinese writing; pairs with 欲速則不達.",
      chars_breakdown: [
        {char:"急", pinyin:"jí",   meaning:"urgent, anxious"},
        {char:"於", pinyin:"yú",   meaning:"in, at, toward"},
        {char:"求", pinyin:"qiú",  meaning:"to seek"},
        {char:"成", pinyin:"chéng", meaning:"success, completion"}
      ]
    },
    yusuzebuda: {
      chars: "欲速則不達",
      pinyin: "yù sù zé bù dá",
      literal: "Desiring speed, one does not arrive.",
      meaning: "He who desires speed does not arrive. Rushing guarantees failure.",
      origin: "From 《論語·子路》: Confucius — 無欲速，無見小利. 'Do not desire speed; do not attend to small gains.'",
      chars_breakdown: [
        {char:"欲", pinyin:"yù", meaning:"to desire"},
        {char:"速", pinyin:"sù", meaning:"speed"},
        {char:"則", pinyin:"zé", meaning:"then, therefore"},
        {char:"不", pinyin:"bù", meaning:"not"},
        {char:"達", pinyin:"dá", meaning:"to arrive"}
      ]
    }
  };

  /* ===================== tooltip ===================== */
  const tooltip = document.getElementById("chengyu-tooltip");

  function buildTooltipHtml(key) {
    const c = CHENGYU[key];
    if (!c || !c.chars_breakdown) return "";
    const rows = c.chars_breakdown.map(b =>
      `<tr><td>${b.char}</td><td>${b.pinyin}</td><td>${b.meaning}</td></tr>`
    ).join("");
    return `<table>${rows}</table><div class="tip-translation">${c.literal}</div>`;
  }

  function positionTooltip(x, y) {
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight, GAP = 12;
    let lx = x + GAP, ly = y + GAP;
    if (lx + tw > window.innerWidth - 8)  lx = x - tw - GAP;
    if (ly + th > window.innerHeight - 8) ly = y - th - GAP;
    tooltip.style.left = lx + "px";
    tooltip.style.top  = ly + "px";
  }

  document.addEventListener("mouseover", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
    positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mousemove", e => {
    if (tooltip.style.display === "block") positionTooltip(e.clientX, e.clientY);
  });

  document.addEventListener("mouseout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    if (e.relatedTarget && e.relatedTarget.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  document.addEventListener("focusin", e => {
    const tip = e.target.closest(".chengyu-tip");
    if (!tip) return;
    const html = buildTooltipHtml(tip.dataset.key);
    if (!html) return;
    tooltip.innerHTML = html;
    const r = tip.getBoundingClientRect();
    tooltip.style.left = r.left + "px";
    tooltip.style.top  = (r.bottom + 8) + "px";
    tooltip.style.display = "block";
    tooltip.removeAttribute("aria-hidden");
  });

  document.addEventListener("focusout", e => {
    if (!e.target.closest(".chengyu-tip")) return;
    tooltip.style.display = "none";
    tooltip.setAttribute("aria-hidden", "true");
  });

  /* ===================== story scenes ===================== */
  /* each scene: { id, location (cn + en), title, subtitle, narration (array of <p>), choices: [{label, next, chengyu?}] } */

  const SCENES = {

    /* ---------- opening ---------- */
    start: {
      locationCn: "威尼斯",
      locationEn: "Venice · 1271",
      title: "The Departure",
      subtitle: "In which a young man is given a name for the road.",
      prologue: true,
      narration: [
        "You are seventeen. The lagoon is grey this morning, and the salt wind off the Adriatic carries the smell of far places — cinnamon, frankincense, dust.",
        "Your father Niccolò and your uncle Maffeo are loading a small fortune in Venetian glass onto a galley bound for Acre. They mean to return to the court of Kublai Khan, and they mean to take you with them.",
        "The road ahead is long, and very few who set out ever come back.",
        "A traveler gives you a small piece of advice before the oars splash: <em>「不積跬步，無以至千里。」</em><span class=\"inline-pinyin\">bù jī kuǐ bù, wú yǐ zhì qiān lǐ</span> A journey of ten thousand miles begins with a single step."
      ],
      choices: [
        { label: "Take the name your mother gave you, and step aboard.", next: "acre" }
      ]
    },

    /* ---------- scene 2: Acre — saiwengshima lesson ---------- */
    acre: {
      locationCn: "阿克里",
      locationEn: "Acre · the Levant",
      title: "The Crossroads",
      subtitle: "Two roads to the East; one looks faster than it is.",
      narration: [
        "In the Acre marketplace you trade a Venetian mirror for passage onward. A Genoese captain offers you a berth on a Black Sea galleon that will reach Hormuz in eight weeks — half the time of the overland caravan.",
        "Your uncle frowns at the galleon's barnacled hull. <span class=\"chengyu-tip\" data-key=\"jiyuqiucheng\" tabindex=\"0\"><em>「急於求成，反而多險。」</em><span class=\"inline-pinyin\">jí yú qiú chéng, fǎn ér duō xiǎn</span></span> Hurry invites trouble, he says. The caravan is slower, but the roads are well-worn and the watchtowers are manned by friends of the Khan.",
        "The captain drums his fingers. <span class=\"chengyu-tip\" data-key=\"saiwengshima\" tabindex=\"0\"><em>「塞翁失馬，安知非福。」</em><span class=\"inline-pinyin\">sài wēng shī mǎ, ān zhī fēi fú</span></span> The old man at the border lost his horse, the proverb goes — and the loss turned into a herd."
      ],
      choices: [
        { label: "Take the galleon. Eight weeks beats sixteen; you'll make up for lost time later.", next: "hormuz" },
        { label: "Follow your uncle. Take the overland caravan, slow and steady.", next: "hormuz", chengyu: "saiwengshima" }
      ]
    },

    /* ---------- scene 3: Hormuz / desert — luyaozhimali lesson ---------- */
    hormuz: {
      locationCn: "霍爾木茲",
      locationEn: "Hormuz · the Persian Gulf",
      title: "A Stranger's Offer",
      subtitle: "A merchant in the desert asks to travel with you.",
      narration: [
        "You stand at the edge of the Dasht-i Lut, the empty desert. Heat ripples the sand into the shape of a distant sea.",
        "A merchant in a stained cotton coat approaches your caravan. He has no water of his own, no camels, no guards. He offers, in exchange for passage to Bukhara, his company — and his memory of every well and safehouse for a thousand miles.",
        "Your father's brother Maffeo looks him over. <span class=\"chengyu-tip\" data-key=\"houjibofa\" tabindex=\"0\"><em>「厚積薄發。」</em><span class=\"inline-pinyin\">hòu jī bó fā</span></span> Accumulate deep; release slowly — and a man who knows every well between here and Bukhara has been accumulating for a very long time."
      ],
      choices: [
        { label: "Refuse. You cannot afford to feed a stranger, and a man alone in the desert is a man with a story.", next: "pamir" },
        { label: "Let the merchant walk beside you. You have water to spare, and the road is long.", next: "pamir", chengyu: "houjibofa" }
      ]
    },

    /* ---------- scene 4: Pamir — shibangongbei lesson ---------- */
    pamir: {
      locationCn: "蔥嶺",
      locationEn: "The Pamir Mountains",
      title: "The High Pass",
      subtitle: "Above the clouds, a choice about pace.",
      narration: [
        "The Pamir pass rises to fifteen thousand feet. The horses grow short of breath; the mules stop to rest every hundred paces. Bandits, you are told, have been seen on the southern trail — moving fast, eager to catch a laden caravan.",
        "Maffeo looks at the animals, then at the sky. <span class=\"chengyu-tip\" data-key=\"yusuzebuda\" tabindex=\"0\"><em>「欲速則不達。」</em><span class=\"inline-pinyin\">yù sù zé bù dá</span></span> He who is in a hurry does not arrive — and adds, quietly, that a clever pace now means arriving in good order, and in good order means arriving first."
      ],
      choices: [
        { label: "Push hard through the night. Beat the bandits to the next valley, and sleep once you're safe.", next: "kashgar" },
        { label: "Rest the caravan. Move at the pace of the slowest mule, and trust that calm arrives sooner than panic.", next: "kashgar", chengyu: "shibangongbei" }
      ]
    },

    /* ---------- scene 5: Kashgar — flavor, no chengyu ---------- */
    kashgar: {
      locationCn: "喀什噶爾",
      locationEn: "Kashgar · the Western Gate",
      title: "A Charm in the Bazaar",
      subtitle: "A small test of greed.",
      narration: [
        "In the Sunday bazaar of Kashgar, a Uyghur trader in a green turban offers you a small brass coin on a red cord. A charm, he says, for safe passage through the desert.",
        "It is very cheap. The trader smiles a very wide smile."
      ],
      choices: [
        { label: "Buy the charm. A little luck is worth a little silver.", next: "khanbaliq" },
        { label: "Decline, politely. Luck is a story we tell after the road.", next: "khanbaliq" }
      ]
    },

    /* ---------- scene 6: Khanbaliq — final choice, ending decides variant ---------- */
    khanbaliq: {
      locationCn: "汗八里",
      locationEn: "Khanbaliq · the court of Kublai Khan",
      title: "The Court of the Great Khan",
      subtitle: "Twenty-four years from Venice. You have arrived.",
      narration: [
        "The throne room of Kublai Khan is a sea of silk. The Great Khan is old, and his eyes are patient.",
        "An interpreter whispers: the Khan will receive your gifts in private, but only one Venetian knows the proper ceremony. You are that Venetian.",
        "The gifts — a golden drinking cup, a small book of hours bound in red, a sample of Venetian glass — are laid out on a tray before you. You may present them one by one, with a story for each, or you may lay them all out at once and bow.",
        "The Khan's eyes rest on you. He says, in a voice like a slow river: <em>「不患無位，患所以立。」</em><span class=\"inline-pinyin\">bù huàn wú wèi, huàn suǒ yǐ lì</span> Do not worry about the rank; worry about whether you deserve it."
      ],
      choices: [
        { label: "Present each gift with its story. A small ceremony is worth more than a great haste.", next: "ending" },
        { label: "Lay them all out at once. The Khan has seen a thousand treasures — he is too old for ceremony.", next: "ending" }
      ]
    },

    /* ---------- ending ---------- */
    ending: {
      locationCn: "歸途",
      locationEn: "The long way home",
      title: "The Return",
      subtitle: "Twenty-four years later, you sail for Venice.",
      ending: true,
      narration: [
        "You are forty-one years old. You carry, in a leather satchel that has been repaired in Samarqand, Kashgar, and Hangzhou, a small book — in a language you have taught yourself to write — that tells the story of every mile.",
        "The Great Khan gave you a golden tablet, a <em>paiza</em>, that will open any door between here and the Black Sea. He said, in his slow voice: <em>「回來告訴他們，東方不是夢。」</em><span class=\"inline-pinyin\">huí lái gào sù tā men, dōng fāng bù shì mèng</span> Go back and tell them the East is not a dream.",
        "You will be a prisoner of Genoa for a year, and in a Genoese jail you will dictate your book to a writer of romances. The book will be called <em>Il Milione</em>. It will change the map of the world."
      ]
    }
  };

  /* ===================== state ===================== */
  const state = {
    name: "Marco",
    score: 0,                  // wise = +1, unwise = -1 (used for ending variant)
    earnedChengyu: new Set(),  // keys from CHENGYU
    history: []                // scene ids visited
  };

  /* ===================== render ===================== */
  const panel = document.getElementById("panel");

  function renderChengyu(key) {
    const c = CHENGYU[key];
    if (!c) return "";
    state.earnedChengyu.add(key);
    return `
      <div class="chengyu-card" role="note" aria-label="Chengyu lesson: ${c.chars}">
        <p class="label">chengyu · 四字成語</p>
        <p class="chars">${c.chars}</p>
        <p class="pinyin">${c.pinyin}</p>
        <p class="literal"><em>literally —</em> ${c.literal}</p>
        <p class="meaning">${c.meaning}</p>
        <p class="origin">${c.origin}</p>
      </div>
    `;
  }

  function renderPrologue(scene) {
    return `
      <div class="location">${scene.locationCn}<span class="en">${scene.locationEn}</span></div>
      <h2 class="scene-title">${scene.title}</h2>
      <p class="scene-subtitle">${scene.subtitle}</p>
      <div class="prologue-name">
        <label for="nameInput">What is your name, traveler?</label>
        <input id="nameInput" type="text" value="Marco" maxlength="24" autocomplete="off" />
      </div>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <button class="continue-btn" id="goAcre">Step aboard</button>
    `;
  }

  function renderScene(scene) {
    if (scene.prologue) {
      panel.innerHTML = renderPrologue(scene);
      document.getElementById("nameInput").addEventListener("input", (e) => {
        const v = e.target.value.trim();
        state.name = v || "Marco";
      });
      document.getElementById("goAcre").addEventListener("click", () => goTo("acre"));
      return;
    }

    if (scene.ending) {
      panel.innerHTML = renderEnding();
      return;
    }

    let pendingChengyuHtml = "";
    let pendingChengyuKey = null;

    const choicesHtml = scene.choices.map((c, i) => {
      return `<li><button class="choice" data-num="${["i", "ii", "iii"][i]}" data-next="${c.next}" data-chengyu="${c.chengyu || ""}">${c.label}</button></li>`;
    }).join("");

    panel.innerHTML = `
      <div class="location">${scene.locationCn}<span class="en">${scene.locationEn}</span></div>
      <h2 class="scene-title">${scene.title}</h2>
      <p class="scene-subtitle">${scene.subtitle}</p>
      <div class="narration">
        ${scene.narration.map(p => `<p>${p}</p>`).join("")}
      </div>
      <ul class="choices">${choicesHtml}</ul>
    `;

    panel.querySelectorAll(".choice").forEach(btn => {
      btn.addEventListener("click", () => {
        const next = btn.dataset.next;
        const ckey = btn.dataset.chengyu;
        // record score
        if (ckey) state.score += 1;     // wise choice
        else state.score -= 1;          // not the lesson-triggering choice
        if (ckey) {
          // show chengyu card inline, then advance
          pendingChengyuKey = ckey;
          showChengyuThenAdvance(ckey, next);
        } else {
          goTo(next);
        }
      });
    });
  }

  function showChengyuThenAdvance(key, next) {
    // insert chengyu card below the choices, with a continue button
    const cardHtml = renderChengyu(key);
    const cont = document.createElement("div");
    cont.innerHTML = cardHtml + `<button class="continue-btn" id="afterChengyu">Continue the journey</button>`;
    panel.appendChild(cont);
    // hide the choices
    const choicesEl = panel.querySelector(".choices");
    if (choicesEl) choicesEl.style.display = "none";
    // scroll card into view
    cont.scrollIntoView({ behavior: "smooth", block: "center" });
    document.getElementById("afterChengyu").addEventListener("click", () => goTo(next));
  }

  function renderEnding() {
    // pick ending variant by score
    let variant;
    if (state.score >= 2)      variant = "humble";       // made wise choices
    else if (state.score >= 0) variant = "trusted";
    else                       variant = "wealthy";

    const variants = {
      humble: {
        title: "Humble Return",
        sub:   "the wisdom of small steps",
        blurb: "You arrive in Venice with very little gold, and a great deal of patience. You are not the loudest man in the tavern, but the merchants seek you out, because the routes you know are the routes that do not lose caravans."
      },
      trusted: {
        title: "Trusted Advisor",
        sub:   "the long acquaintance",
        blurb: "You return with the friendship of the merchant you took into your caravan, and a memory for faces that opens doors from Genoa to Cathay. You are the man a captain wants at his side when the road grows strange."
      },
      wealthy: {
        title: "Wealthy Merchant",
        sub:   "the glittering galleon",
        blurb: "You arrive in Venice with a galleon-full of silk and a story about a shortcut. You live well, and you are never quite sure the shortcut was the right one."
      }
    };
    const v = variants[variant];

    // glossary — show ALL 3 chengyu, mark which were earned in this playthrough
    const allKeys = ["saiwengshima", "houjibofa", "shibangongbei"];
    const glossaryHtml = allKeys.map(k => {
      const c = CHENGYU[k];
      const earned = state.earnedChengyu.has(k);
      return `
        <div class="glossary-entry">
          <h3 class="ge-title">${c.chars}${earned ? '<span class="earned">— earned</span>' : '<span class="earned">— not met on this road</span>'}</h3>
          <p class="ge-pinyin">${c.pinyin}</p>
          <p class="ge-row"><b>literally</b> ${c.literal}</p>
          <p class="ge-row"><b>meaning</b> ${c.meaning}</p>
          <p class="ge-row"><b>origin</b> ${c.origin}</p>
        </div>
      `;
    }).join("");

    return `
      <div class="location">${SCENES.ending.locationCn}<span class="en">${SCENES.ending.locationEn}</span></div>
      <h2 class="scene-title">${SCENES.ending.title}</h2>
      <p class="scene-subtitle">${SCENES.ending.subtitle}</p>
      <div class="narration">
        ${SCENES.ending.narration.map(p => `<p>${p}</p>`).join("")}
      </div>

      <div class="ending-block">
        <h3 class="ending-title">${v.title}</h3>
        <p class="ending-sub">${v.sub}</p>
        <p class="ending-blurb">${v.blurb}</p>
        <button class="continue-btn" id="restart">Begin the journey again</button>
      </div>

      <section class="glossary" aria-label="Chengyu glossary">
        <h2>成語 · Chengyu Glossary</h2>
        <p class="sub">Three proverbs from the road, and the small stories behind them.</p>
        ${glossaryHtml}
      </section>
    `;
  }

  function goTo(id) {
    state.history.push(id);
    const scene = SCENES[id];
    if (!scene) return;
    renderScene(scene);
    // scroll the panel to the top of the visible area
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  /* ===================== restart ===================== */
  panel.addEventListener("click", (e) => {
    if (e.target && e.target.id === "restart") {
      state.name = "Marco";
      state.score = 0;
      state.earnedChengyu = new Set();
      state.history = [];
      panel.innerHTML = "";
      goTo("start");
    }
  });

  /* ===================== keyboard ===================== */
  document.addEventListener("keydown", (e) => {
    // 1/2/3 to pick a choice in the current scene
    const choices = panel.querySelectorAll(".choice");
    if (choices.length && (e.key === "1" || e.key === "2" || e.key === "3")) {
      const idx = ["1", "2", "3"].indexOf(e.key);
      if (choices[idx]) {
        e.preventDefault();
        choices[idx].click();
      }
    }
    // Enter on prologue advances
    if (document.getElementById("goAcre") && e.key === "Enter") {
      e.preventDefault();
      document.getElementById("goAcre").click();
    }
  });

  /* ===================== boot ===================== */
  goTo("start");
</script>

</body>
</html>
